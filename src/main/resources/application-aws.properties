cloud.aws.stack.auto=false
cloud.aws.region.auto=false
cloud.aws.region.static=region
cloud.aws.credentials.access-key=key
cloud.aws.credentials.secret-key=key
logging.level.com.amazonaws.util.EC2MetadataUtils=error


cloud.aws.s3.bucket=bucketName
cloud.aws.s3.bucket.temp-path=product/temp/
cloud.aws.s3.bucket.upload-path=product/upload/
cloud.aws.s3.domain=bucketDomain
