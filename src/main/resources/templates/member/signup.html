<!DOCTYPE html>
<html xmlns:th="//www.thymeleaf.org" th:replace="~{layout/layout-common :: layout(~{::head},~{::main})}">
	<head>
		<link rel="stylesheet" href="/css/member/signup.css">
		<script src="/js/member/signup.js"></script>
	</head>
	<main>
		<h1>회원가입페이지</h1>
		<div class="signup-area">
			<h1>회원가입</h1>
			<form action="/member/signup" method="post">
				<div>
					<label for="id">아이디</label>
					<input type="text" id="id" name="id" placeholder="아이디" onblur="regexId()" maxlength="16">
					<span class="msg">sample</span>
				</div>
				<div>
					<label for="password">비밀번호</label>
					<input type="password" id="password" name="password" placeholder="비밀번호"  onblur="regexPassword()" maxlength="20">
					<span class="msg"></span>
				</div>
				<div>
					<label for="confirm-password">비밀번호확인</label>
					<input type="password" id="confirm-password" placeholder="비밀번호확인" onblur="confirmPassword()" maxlength="20">
					<span class="msg"></span>
				</div>
				<div>
					<label for="name">이름</label>
					<input type="text" id="name" name="name" placeholder="이름">
					<span class="msg"></span>
				</div>
				<div>
					<label for="email">이메일</label>
					<input type="text" id="email" name="email" placeholder="이메일" onblur="regexEmail()">
					<span class="msg"></span>
				</div>
				<div>
					<label for="phone">휴대폰번호</label>
					<input type="text" id="phone" name="phone" placeholder="전화번호" onblur="regexPhone()" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');"/>
					<span class="msg"></span>
				</div>
				<div>
					<input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<button class="btn-submit" type="submit">회원가입</button>
				</div>
			</form>
		</div>
	</main>
</html>
